name: Update OpenWrt Packages
on:
  push:
    branches: [ master ]
  workflow_dispatch:
  schedule:
  - cron: 0 */12 * * *

env:
  TZ: Asia/Shanghai

jobs:
  Update_OpenWrt_Packages:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        branch:
          - OpenWrt-25.x
          - OpenWrt-24.x

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Install Dependencies
        run: |
          sudo timedatectl set-timezone "$TZ"

      - name: Update OpenWrt Packages
        id: update
        run: |
          chmod +x sync-packages.sh
          ./sync-packages.sh
          echo "message=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ steps.update.outputs.message }}

  Delete_Workflow:
    needs: [ Update_OpenWrt_Packages ]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2
